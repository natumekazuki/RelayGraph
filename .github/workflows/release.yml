name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
            binary: relaygraph.exe
            installer: msi
          - os: ubuntu-latest
            artifact: linux-x64
            binary: relaygraph
            installer: deb
          - os: macos-latest
            artifact: macos-arm64
            binary: relaygraph
            installer: pkg
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag format: $env:RELEASE_TAG"
          }
          $head = git rev-parse HEAD
          $tagCommit = git rev-list -n 1 "refs/tags/$env:RELEASE_TAG"
          if ($head -ne $tagCommit) {
            throw "Checked out commit $head does not match refs/tags/$env:RELEASE_TAG ($tagCommit)"
          }

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --locked

      - name: Validate RelayGraph
        run: cargo run --locked -- validate

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Smoke release executable without plugin files
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP "relaygraph-release-smoke"
          New-Item -ItemType Directory -Force $smoke | Out-Null
          Push-Location $smoke
          try {
            git init | Out-Null
            Set-Content -Path README.md -Value "# Smoke"
            & "${{ github.workspace }}/target/release/${{ matrix.binary }}" validate --json
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }

      - name: Install WiX
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.*
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package Windows MSI
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_ARTIFACT: ${{ matrix.artifact }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = $env:RELEASE_TAG.TrimStart("v")
          $installer = "relaygraph-$env:RELEASE_TAG-$env:RELEASE_ARTIFACT.msi"
          wix build .github/installers/relaygraph.wxs `
            -arch x64 `
            -d ProductVersion=$version `
            -d RelayGraphExe="${{ github.workspace }}\target\release\${{ matrix.binary }}" `
            -out (Join-Path "dist" $installer)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package Linux DEB
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_ARTIFACT: ${{ matrix.artifact }}
          RELEASE_BINARY: ${{ matrix.binary }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $packageRoot = Join-Path $env:RUNNER_TEMP "relaygraph-deb"
          New-Item -ItemType Directory -Force (Join-Path $packageRoot "DEBIAN") | Out-Null
          New-Item -ItemType Directory -Force (Join-Path $packageRoot "usr/bin") | Out-Null

          $version = $env:RELEASE_TAG.TrimStart("v")
          $control = @"
          Package: relaygraph
          Version: $version
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: natumekazuki
          Description: Build deterministic resource graphs from Git-backed YAML declarations
          "@
          Set-Content -Path (Join-Path $packageRoot "DEBIAN/control") -Value ($control -replace "(?m)^          ", "") -Encoding utf8
          install -m 0755 "${{ github.workspace }}/target/release/$env:RELEASE_BINARY" (Join-Path $packageRoot "usr/bin/relaygraph")

          $installer = "relaygraph-$env:RELEASE_TAG-$env:RELEASE_ARTIFACT.deb"
          dpkg-deb --build --root-owner-group $packageRoot (Join-Path "dist" $installer)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package macOS PKG
        if: ${{ matrix.os == 'macos-latest' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_ARTIFACT: ${{ matrix.artifact }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $packageRoot = Join-Path $env:RUNNER_TEMP "relaygraph-pkg-root"
          $binDir = Join-Path $packageRoot "usr/local/bin"
          New-Item -ItemType Directory -Force $binDir | Out-Null
          Copy-Item "${{ github.workspace }}/target/release/${{ matrix.binary }}" (Join-Path $binDir "relaygraph")
          chmod 0755 (Join-Path $binDir "relaygraph")

          $version = $env:RELEASE_TAG.TrimStart("v")
          $installer = Join-Path "dist" "relaygraph-$env:RELEASE_TAG-$env:RELEASE_ARTIFACT.pkg"
          $pkgbuildArgs = @(
            "--root", $packageRoot,
            "--identifier", "io.github.natumekazuki.relaygraph",
            "--version", $version,
            "--install-location", "/"
          )
          $pkgbuildArgs += $installer

          pkgbuild @pkgbuildArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: relaygraph-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum relaygraph-${{ inputs.tag }}-* > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: RelayGraph ${{ inputs.tag }}
          files: dist/*
