name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
            binary: relaygraph.exe
            archive: zip
          - os: ubuntu-latest
            artifact: linux-x64
            binary: relaygraph
            archive: tar.gz
          - os: macos-13
            artifact: macos-x64
            binary: relaygraph
            archive: tar.gz
          - os: macos-latest
            artifact: macos-arm64
            binary: relaygraph
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag format: $env:RELEASE_TAG"
          }
          $head = git rev-parse HEAD
          $tagCommit = git rev-list -n 1 "refs/tags/$env:RELEASE_TAG"
          if ($head -ne $tagCommit) {
            throw "Checked out commit $head does not match refs/tags/$env:RELEASE_TAG ($tagCommit)"
          }

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --locked

      - name: Validate RelayGraph
        run: cargo run --locked -- validate

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Smoke release executable without plugin files
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP "relaygraph-release-smoke"
          New-Item -ItemType Directory -Force $smoke | Out-Null
          Push-Location $smoke
          try {
            git init | Out-Null
            Set-Content -Path README.md -Value "# Smoke"
            & "${{ github.workspace }}/target/release/${{ matrix.binary }}" validate --json
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Pop-Location
          }

      - name: Package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_ARTIFACT: ${{ matrix.artifact }}
          RELEASE_ARCHIVE: ${{ matrix.archive }}
          RELEASE_BINARY: ${{ matrix.binary }}
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP "relaygraph-package"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item "${{ github.workspace }}/target/release/$env:RELEASE_BINARY" (Join-Path $packageDir $env:RELEASE_BINARY)

          New-Item -ItemType Directory -Force dist | Out-Null
          $archive = "relaygraph-$env:RELEASE_TAG-$env:RELEASE_ARTIFACT.$env:RELEASE_ARCHIVE"
          $archivePath = Join-Path "dist" $archive
          if ($env:RELEASE_ARCHIVE -eq "zip") {
            Compress-Archive -Path (Join-Path $packageDir $env:RELEASE_BINARY) -DestinationPath $archivePath -Force
          } else {
            tar -czf $archivePath -C $packageDir $env:RELEASE_BINARY
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: relaygraph-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum relaygraph-${{ inputs.tag }}-* > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: RelayGraph ${{ inputs.tag }}
          files: dist/*
