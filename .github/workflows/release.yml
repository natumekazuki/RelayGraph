name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify release tag
        id: verify
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag format: $env:RELEASE_TAG"
          }
          $head = git rev-parse HEAD
          $tagCommit = git rev-list -n 1 "refs/tags/$env:RELEASE_TAG"
          if ($head -ne $tagCommit) {
            throw "Checked out commit $head does not match refs/tags/$env:RELEASE_TAG ($tagCommit)"
          }
          "release_version=$($env:RELEASE_TAG.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --locked

      - name: Validate RelayGraph
        run: cargo run --locked -- validate

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Smoke release executable without plugin files
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP "relaygraph-release-smoke"
          New-Item -ItemType Directory -Force $smoke | Out-Null
          Push-Location $smoke
          git init | Out-Null
          Set-Content -Path README.md -Value "# Smoke"
          & "${{ github.workspace }}\target\release\relaygraph.exe" validate --json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

      - name: Package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/relaygraph.exe dist/relaygraph.exe
          $zip = "relaygraph-$env:RELEASE_TAG-windows-x64.zip"
          Compress-Archive -Path dist/relaygraph.exe -DestinationPath $zip -Force
          $hash = Get-FileHash -Algorithm SHA256 $zip
          "$($hash.Hash.ToLowerInvariant())  $zip" | Set-Content -Encoding UTF8 SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: RelayGraph ${{ inputs.tag }}
          files: |
            relaygraph-${{ inputs.tag }}-windows-x64.zip
            SHA256SUMS.txt
