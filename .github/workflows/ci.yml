name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate RelayGraph
        run: cargo run --locked -- validate

      - name: Rebuild cache
        run: cargo run --locked -- cache rebuild

      - name: Check cache diagnostics
        run: cargo run --locked -- cache diagnostics

      - name: Release build
        run: cargo build --locked --release
